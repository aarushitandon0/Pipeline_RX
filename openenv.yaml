name: pipelinerx
version: "1.0.0"
description: "RL environment for diagnosing and repairing broken data pipelines"
author: "PipelineRx Team"
license: MIT
tags: [data-engineering, tabular, multi-task, deterministic]

server:
  type: http
  base_url: "http://localhost:7860"

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  tasks:
    method: GET
    path: /tasks
  health:
    method: GET
    path: /health

observation_space:
  type: object
  description: "Corrupted DataFrame statistics and sample rows"

action_space:
  type: object
  description: "Targeted data fix operations"
  actions:
    - fill_nulls
    - cast_column
    - drop_column
    - deduplicate
    - convert_units
    - inspect
    - finish

tasks:
  - name: null_sweep
    description: "Fix null values in a sensor dataset"
    difficulty: easy
    max_steps: 8
  - name: type_drift
    description: "Correct type errors in a mixed-format dataset"
    difficulty: medium
    max_steps: 10
  - name: duplicate_drift
    description: "Deduplicate a CDC-replayed event log"
    difficulty: medium
    max_steps: 10
  - name: unit_mismatch
    description: "Convert units across EU/US regional data merge"
    difficulty: hard
    max_steps: 12
  - name: pipeline_cascade
    description: "Fix all failure modes in the correct order"
    difficulty: very_hard
    max_steps: 15
